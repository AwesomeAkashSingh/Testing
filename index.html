<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dues Ledger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --paper: #f6f3ec;
    --ink: #1a2332;
    --ink-soft: #4a5568;
    --line: #d8d2c4;
    --overdue: #b3402d;
    --soon: #c07a1e;
    --upcoming: #2b5c8a;
    --later: #8a8578;
    --paid: #3d7a52;
    --card: #fffdf8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 28px 80px; }

  header {
    padding: 48px 0 28px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 28px;
  }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 42px;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .sub { color: var(--ink-soft); font-size: 14px; max-width: 560px; line-height: 1.5; }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 24px;
    align-items: center;
  }
  select, button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 9px 14px;
    border: 1.5px solid var(--ink);
    background: var(--card);
    color: var(--ink);
    border-radius: 3px;
    cursor: pointer;
  }
  button.refresh {
    background: var(--ink);
    color: var(--paper);
  }
  button.refresh:hover { background: #0d1420; }
  .updated-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    margin-left: auto;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1px;
    background: var(--line);
    border: 1.5px solid var(--ink);
    margin-bottom: 36px;
  }
  .stat {
    background: var(--card);
    padding: 18px 20px;
  }
  .stat .n {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
  }
  .stat .l {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 14px;
  }

  .ticket {
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    position: relative;
    padding: 16px 18px 14px;
    border-left-width: 6px;
  }
  .ticket.overdue { border-left-color: var(--overdue); }
  .ticket.soon { border-left-color: var(--soon); }
  .ticket.upcoming { border-left-color: var(--upcoming); }
  .ticket.later { border-left-color: var(--later); }
  .ticket.paid { border-left-color: var(--paid); }

  .t-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }
  .t-card-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 17px;
    line-height: 1.2;
  }
  .t-account {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin-top: 3px;
  }
  .pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 20px;
    color: #fff;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .pill.overdue { background: var(--overdue); }
  .pill.soon { background: var(--soon); }
  .pill.upcoming { background: var(--upcoming); }
  .pill.later { background: var(--later); }
  .pill.paid { background: var(--paid); }

  .t-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 4px 0;
    border-top: 1px dashed var(--line);
  }
  .t-row:first-of-type { border-top: none; }
  .t-row .l { color: var(--ink-soft); }
  .t-row .v { font-family: 'IBM Plex Mono', monospace; font-weight: 500; }
  .t-row .v.pending { color: var(--overdue); font-weight: 600; }
  .t-row .v.pending.zero { color: var(--paid); }

  .limit-track {
    margin-top: 10px;
    height: 5px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 3px;
    overflow: hidden;
  }
  .limit-fill { height: 100%; background: var(--upcoming); }
  .limit-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    margin-top: 5px;
  }

  .empty, .loading, .err {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    border: 1.5px dashed var(--line);
    border-radius: 4px;
  }
  .err { color: var(--overdue); border-color: var(--overdue); }

  @media (max-width: 560px) {
    h1 { font-size: 30px; }
    .wrap { padding: 0 16px 60px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Personal Ledger — Live from Google Sheets</div>
    <h1>Dues Dashboard</h1>
    <div class="sub">Every card, every person, sorted by what's due soonest. Pending is calculated as Due minus Paid, always current.</div>
    <div class="controls">
      <select id="personFilter"><option value="ALL">All people</option></select>
      <select id="statusFilter">
        <option value="ALL">All statuses</option>
        <option value="overdue">Overdue</option>
        <option value="soon">Due soon (≤3d)</option>
        <option value="upcoming">Upcoming (≤10d)</option>
        <option value="later">Later</option>
        <option value="paid">Paid</option>
      </select>
      <button class="refresh" onclick="loadData()">↻ Refresh</button>
      <span class="updated-tag" id="updatedTag"></span>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="section-label">Entries</div>
  <div id="content" class="loading">Loading dues…</div>
</div>

<script>
  // ── Configure your sheet here ──
  const SHEET_ID = '1q4EhX1RNMWXooqszhMz_X9if9Qyj3zRZ-8BcXwHLy7Y';
  const SHEET_NAME = 'Sheet1';
  const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

  let allEntries = [];

  function parseCSV(text) {
    // Simple CSV parser handling quoted fields with commas
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i], next = text[i + 1];
      if (inQuotes) {
        if (c === '"' && next === '"') { field += '"'; i++; }
        else if (c === '"') { inQuotes = false; }
        else { field += c; }
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\r') { /* skip */ }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else { field += c; }
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function parseNumber(v) {
    if (!v) return 0;
    const cleaned = String(v).replace(/[₹,\s]/g, '');
    const n = parseFloat(cleaned);
    return isNaN(n) ? 0 : n;
  }

  function parseDate(v) {
  if (!v) return null;
  const s = String(v).trim();

  // gviz "Date(2026,6,15)" format
  const gvizMatch = s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (gvizMatch) {
    return new Date(+gvizMatch[1], +gvizMatch[2], +gvizMatch[3]);
  }

  // MM/DD/YYYY or MM-DD-YYYY
  const mdyMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (mdyMatch) {
    let [, month, day, year] = mdyMatch;
    if (year.length === 2) year = '20' + year;
    const d = new Date(+year, +month - 1, +day);
    return isNaN(d.getTime()) ? null : d;
  }

  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

  function daysUntil(dateObj) {
    const today = new Date(); today.setHours(0,0,0,0);
    const t = new Date(dateObj); t.setHours(0,0,0,0);
    return Math.round((t - today) / 86400000);
  }

  function fmtDate(d) {
    if (!d) return '—';
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function fmtRs(n) {
    return '₹' + (n || 0).toLocaleString('en-IN');
  }

  function classify(e) {
    if (e.pending <= 0) return 'paid';
    if (e.daysUntilDue === null) return 'later';
    if (e.daysUntilDue < 0) return 'overdue';
    if (e.daysUntilDue <= 3) return 'soon';
    if (e.daysUntilDue <= 10) return 'upcoming';
    return 'later';
  }

  function statusLabel(e, cls) {
    if (cls === 'paid') return 'Paid';
    const d = e.daysUntilDue;
    if (d === null) return 'No date';
    if (d < 0) return Math.abs(d) + 'd overdue';
    if (d === 0) return 'Due today';
    return 'in ' + d + 'd';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }

  async function loadData() {
    const content = document.getElementById('content');
    content.className = 'loading';
    content.textContent = 'Loading dues…';

    try {
      const res = await fetch(CSV_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status + ' — check sheet sharing is set to "Anyone with link can view"');
      const text = await res.text();
      const rows = parseCSV(text);
      if (rows.length < 2) throw new Error('Sheet appears empty');

      const dataRows = rows.slice(1); // skip header
      allEntries = [];

      dataRows.forEach(r => {
        const account = (r[0] || '').trim();
        const cardName = (r[1] || '').trim();
        if (!account && !cardName) return;

        const dueDate = parseDate(r[2]);
        const due = parseNumber(r[3]);
        const paid = parseNumber(r[4]);
        let pending = due - paid;
        if (pending < 0) pending = 0;

        const updatedOn = r[6] || '';
        const statement = r[7] || '';
        const totalLimit = parseNumber(r[9]);
        const currentLimit = parseNumber(r[10]);

        allEntries.push({
          account, cardName,
          dueDate, dueDateDisplay: fmtDate(dueDate),
          due, paid, pending,
          updatedOn, statement,
          totalLimit, currentLimit,
          daysUntilDue: dueDate ? daysUntil(dueDate) : null
        });
      });

      allEntries.sort((a, b) => {
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1;
        if (!b.dueDate) return -1;
        return a.dueDate - b.dueDate;
      });

      populatePersonFilter();
      render();
      document.getElementById('updatedTag').textContent =
        'Fetched ' + new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

    } catch (err) {
      content.className = 'err';
      content.innerHTML = 'Could not load sheet data.<br><br>' + escapeHtml(err.message) +
        '<br><br>Make sure the sheet is shared as "Anyone with the link can view".';
    }
  }

  function populatePersonFilter() {
    const select = document.getElementById('personFilter');
    const current = select.value;
    const people = [...new Set(allEntries.map(e => e.account).filter(Boolean))].sort();
    select.innerHTML = '<option value="ALL">All people</option>' +
      people.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
    if (people.includes(current)) select.value = current;
  }

  function render() {
    const person = document.getElementById('personFilter').value;
    const status = document.getElementById('statusFilter').value;

    const filtered = allEntries.filter(e => {
      const cls = classify(e);
      if (person !== 'ALL' && e.account !== person) return false;
      if (status !== 'ALL' && cls !== status) return false;
      return true;
    });

    renderStats();
    renderGrid(filtered);
  }

  function renderStats() {
    const totalPending = allEntries.reduce((s, e) => s + e.pending, 0);
    const overdue = allEntries.filter(e => classify(e) === 'overdue').length;
    const soon = allEntries.filter(e => classify(e) === 'soon').length;
    const paid = allEntries.filter(e => classify(e) === 'paid').length;

    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="n" style="color:var(--overdue)">${fmtRs(totalPending)}</div><div class="l">Total pending</div></div>
      <div class="stat"><div class="n" style="color:var(--overdue)">${overdue}</div><div class="l">Overdue</div></div>
      <div class="stat"><div class="n" style="color:var(--soon)">${soon}</div><div class="l">Due soon</div></div>
      <div class="stat"><div class="n" style="color:var(--paid)">${paid}</div><div class="l">Paid up</div></div>
      <div class="stat"><div class="n">${allEntries.length}</div><div class="l">Total entries</div></div>
    `;
  }

  function renderGrid(entries) {
    const content = document.getElementById('content');
    if (!entries.length) {
      content.className = 'empty';
      content.textContent = 'No entries match this filter.';
      return;
    }
    content.className = 'grid';
    content.innerHTML = entries.map(e => {
      const cls = classify(e);
      const label = statusLabel(e, cls);
      const limitPct = e.totalLimit > 0 ? Math.min(100, Math.round(((e.totalLimit - e.currentLimit) / e.totalLimit) * 100)) : null;
      return `
        <div class="ticket ${cls}">
          <div class="t-top">
            <div>
              <div class="t-card-name">${escapeHtml(e.cardName || 'Unnamed card')}</div>
              <div class="t-account">${escapeHtml(e.account)}</div>
            </div>
            <div class="pill ${cls}">${label}</div>
          </div>
          <div class="t-row"><span class="l">Due date</span><span class="v">${e.dueDateDisplay}</span></div>
          <div class="t-row"><span class="l">Due</span><span class="v">${fmtRs(e.due)}</span></div>
          <div class="t-row"><span class="l">Paid</span><span class="v">${fmtRs(e.paid)}</span></div>
          <div class="t-row"><span class="l">Pending</span><span class="v pending ${e.pending <= 0 ? 'zero' : ''}">${fmtRs(e.pending)}</span></div>
          ${e.statement ? `<div class="t-row"><span class="l">Statement</span><span class="v">${escapeHtml(e.statement)}</span></div>` : ''}
          ${e.updatedOn ? `<div class="t-row"><span class="l">Updated</span><span class="v">${escapeHtml(e.updatedOn)}</span></div>` : ''}
          ${e.totalLimit > 0 ? `
            <div class="limit-track"><div class="limit-fill" style="width:${limitPct}%"></div></div>
            <div class="limit-note">${fmtRs(e.totalLimit - e.currentLimit)} used of ${fmtRs(e.totalLimit)} (${limitPct}%)</div>
          ` : ''}
        </div>
      `;
    }).join('');
  }

  document.getElementById('personFilter').addEventListener('change', render);
  document.getElementById('statusFilter').addEventListener('change', render);

  loadData();
</script>
</body>
</html>
