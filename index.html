<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dues Ledger</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="pageTitle">Cards and Benefits</h1>
  </header>

  <div class="nav-tabs" id="navTabs">
    <button class="tab active" data-tab="dues">Dues</button>
    <button class="tab" data-tab="debit">Debit cards</button>
    <button class="tab" data-tab="credit">Credit cards</button>
    <button class="tab" data-tab="rewards">Rewards</button>
  </div>

  <div id="duesSection">
    <div class="stats" id="stats"></div>

    <div class="person-tabs" id="personTabs">
      <button class="person-btn active" data-person="ALL">All</button>
    </div>

    <div class="section-label">Entries</div>
    <div id="content" class="loading">Loading dues…</div>
  </div>

  <div id="debitSection" class="tab-content" style="display:none;"></div>
  <div id="creditSection" class="tab-content" style="display:none;"></div>
  <div id="rewardsSection" class="tab-content" style="display:none;"></div>
</div>

<script src="app.js" defer></script>
</body>
</html>
